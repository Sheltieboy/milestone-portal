<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Robot Blending — Milestone Games</title>
<link rel="stylesheet" href="shell.css?v=4">
<style>
  #stage{cursor:default;display:flex;flex-direction:column;background:#fbeeec}
  .robot{text-align:center;font-size:13vh;line-height:1;padding:2vh 0 0;transition:transform .18s}
  .robot.talk{animation:bob .6s ease-in-out}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.4vh)}}
  .say{text-align:center;color:#8a3b34;font-size:3vh;font-weight:700;margin-top:.6vh}
  .opts{flex:1;display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:center;padding:8px 16px 16px}
  .opt{font-size:11vh;background:#fff;border:4px solid #f0ddd9;border-radius:22px;width:21vh;height:21vh;min-width:108px;min-height:108px;max-width:188px;max-height:188px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,border-color .15s}
  .opt .lbl{font-size:2.4vh;font-weight:700;color:#3a5244}
  .opt:active{transform:scale(.96)}
  .opt.wrong{animation:wob .4s}.opt.right{border-color:#cf5b50;transform:scale(1.08)}
  @keyframes wob{0%,100%{transform:translateX(0)}25%{transform:translateX(-12px)}75%{transform:translateX(12px)}}
  .replay{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.9);border:none;border-radius:14px;padding:9px 16px;font-weight:700;font-size:14px;color:#cf5b50;cursor:pointer;font-family:inherit;z-index:4}
</style>
</head>
<body>
<div class="app">
  <div class="bar" id="bar"></div>
  <div class="stage" id="stage">
    <button class="snap" onclick="MGame.openEvidence()">📷 Snap evidence</button>
    <div class="counter">Read: <span id="count">0</span></div>
    <button class="replay" id="replay">🔊 Robot, say it again</button>
    <div class="cue" id="cue"></div>
    <div class="robot" id="robot">🤖</div>
    <div class="say">Listen to the sounds — which one is it?</div>
    <div class="opts" id="opts"></div>
  </div>
</div>
<div class="sheet" id="sheet"></div>
<script src="shell.js?v=6"></script>
<script src="evidence.js?v=5"></script>
<script>
(function(){
  var PH={a:'a',b:'buh',c:'cuh',d:'duh',e:'eh',f:'fff',g:'guh',h:'huh',i:'ih',j:'juh',k:'cuh',l:'lll',m:'mmm',n:'nnn',o:'o',p:'puh',r:'rrr',s:'sss',t:'tuh',u:'uh',v:'vvv',w:'wuh',x:'ks',y:'yuh',z:'zzz'};
  var WORDS=[
    ['🐱','cat',['c','a','t']],['🐶','dog',['d','o','g']],['🐷','pig',['p','i','g']],
    ['☀️','sun',['s','u','n']],['🎩','hat',['h','a','t']],['🚌','bus',['b','u','s']],
    ['🥤','cup',['c','u','p']],['🛏️','bed',['b','e','d']],['🦊','fox',['f','o','x']],
    ['🐔','hen',['h','e','n']],['🐛','bug',['b','u','g']],['🚐','van',['v','a','n']],
    ['🥅','net',['n','e','t']],['🖊️','pen',['p','e','n']],['📦','box',['b','o','x']],
    ['🗺️','map',['m','a','p']],['🦵','leg',['l','e','g']],['🕸️','web',['w','e','b']],
    ['🍯','jam',['j','a','m']],['🔟','ten',['t','e','n']]
  ];
  var opts=document.getElementById('opts'), countEl=document.getElementById('count'),
      robot=document.getElementById('robot');
  var count=0, busy=false, target=null;

  MGame.init({
    title:'Robot Blending',
    framework:'CfE early literacy',
    statement:'Blends spoken sounds to recognise a CVC word',
    engagement:'Realisation · Persistence',
    praise:'listening',
    setup:[
      {key:'vowel', label:'Word set', options:[{v:'all',label:'All CVC'},{v:'a',label:'a · cat, hat'},{v:'e',label:'e · hen, bed'},{v:'o',label:'o · dog, fox'},{v:'u',label:'u · sun, cup'}], default:'all'},
      {key:'choices', label:'Picture choices', options:[{v:3,label:'3'},{v:2,label:'2'}], default:3},
      {key:'speed', label:'Robot speed', options:[{v:'normal',label:'Normal'},{v:'slow',label:'Slow'}], default:'normal'},
      {key:'voiceMode', label:'Sounds voice', options:[{v:'auto',label:'My recording'},{v:'computer',label:'Computer'}], default:'auto'}
    ],
    onConfig:function(){ round(); }
  });
  function vpool(){ var v=MGame.cfg('vowel'); if(!v||v==='all') return WORDS; var f=WORDS.filter(function(w){ return w[1].charAt(1)===v; }); return f.length?f:WORDS; }

  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t; } return a; }
  function robotSay(){
    robot.classList.remove('talk'); void robot.offsetWidth; robot.classList.add('talk');
    var ls=target[2], i=0, gap=(MGame.cfg('speed')==='slow'?1000:720);
    (function next(){ if(i>=ls.length) return; MGame.say(PH[ls[i]]||ls[i]); MGame.tone(300+i*90,.1,'square'); i++; setTimeout(next, gap); })();
  }
  document.getElementById('replay').addEventListener('click', function(){ if(!busy||true) robotSay(); });

  function round(){
    busy=false; opts.innerHTML='';
    var n=MGame.cfg('choices')||3;
    var pool=shuffle(vpool().slice());
    target=pool[0];
    var set=shuffle(pool.slice(0,Math.max(2,n)));
    set.forEach(function(w){
      var o=document.createElement('div'); o.className='opt'; o.innerHTML=w[0]+'<div class="lbl">'+w[1]+'</div>';
      o.addEventListener('click', function(){
        if(busy) return;
        if(w===target){
          busy=true; o.classList.add('right');
          MGame.win({el:o, say:w[1], praiseKey:'listening', cue:'Yes! '+w[1]});
          count++; countEl.textContent=count;
          setTimeout(function(){ MGame.hideCue(); round(); }, 1600);
        } else { o.classList.remove('wrong'); void o.offsetWidth; o.classList.add('wrong'); MGame.tone(200,.12,'sine'); }
      });
      opts.appendChild(o);
    });
    setTimeout(robotSay, 500);
  }
  round();
})();
</script>
<script>window.MEvidence&&MEvidence.init({title:"Robot Blending",evidence:{framework:"cfe",statementMatch:"blend"},noteUnit:"words read"});</script>
</body>
</html>
